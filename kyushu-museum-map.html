<header>

</header>

<div class="main">

    <button class="search-btn" onclick="filterByName()">登録館を検索</button>
  </div>
  <!-- 登録館名検索バー -->
  <div style="position:absolute;top:62px;left:16px;z-index:500;">
    <input type="text" id="search-input" placeholder="登録館名で絞り込み..." oninput="filterMarkers()"
      style="padding:6px 12px;border-radius:18px;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.2);font-family:inherit;font-size:0.78rem;width:200px;outline:none;">
  </div>

  <div class="pref-filters">
    <button class="pref-btn active" onclick="setPref('all',this)">すべて</button>
    <button class="pref-btn" onclick="setPref('福岡',this)">福岡</button>
    <button class="pref-btn" onclick="setPref('佐賀',this)">佐賀</button>
    <button class="pref-btn" onclick="setPref('長崎',this)">長崎</button>
    <button class="pref-btn" onclick="setPref('熊本',this)">熊本</button>
    <button class="pref-btn" onclick="setPref('大分',this)">大分</button>
    <button class="pref-btn" onclick="setPref('宮崎',this)">宮崎</button>
    <button class="pref-btn" onclick="setPref('鹿児島',this)">鹿児島</button>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <h2 id="d-name"></h2>
      <div class="pref-badge" id="d-pref"></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div id="d-info"></div>
      <div class="section-label">訪問記録</div>
      <button class="visited-btn" id="visited-btn" onclick="toggleVisited()">✓ 訪問済みにする</button>
      <div class="section-label">評価</div>
      <div class="stars">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
      </div>
      <div class="section-label">メモ・感想</div>
      <textarea id="memo" placeholder="展示の感想、次回確認したいことなど..."></textarea>
      <button class="save-btn" onclick="saveMemo()">保存する</button>
    </div>
  </div>

  <button class="add-btn" onclick="openModal()">＋ 館を追加</button>

  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#c0392b"></div>未訪問</div>
    <div class="legend-item"><div class="dot" style="background:#27ae60"></div>訪問済み</div>
    <div class="legend-item"><div class="dot" style="background:#f0c040"></div>自分で追加</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>🏛 館を追加する</h3>
    <p class="modal-hint">rekimin.com掲載外の歴史館を追加できます。<br>緯度経度はGoogle Mapsで右クリック→「この場所について」で確認できます。</p>
    <input type="text" id="m-name" placeholder="館名 *">
    <input type="text" id="m-address" placeholder="住所">
    <input type="text" id="m-tel" placeholder="TEL">
    <input type="text" id="m-url" placeholder="URL">
    <select id="m-pref">
      <option value="">県を選択</option>
      <option>福岡県</option><option>佐賀県</option><option>長崎県</option>
      <option>熊本県</option><option>大分県</option><option>宮崎県</option>
      <option>鹿児島県</option><option>沖縄県</option>
    </select>
    <input type="number" id="m-lat" placeholder="緯度（例: 33.5196）" step="0.0001">
    <input type="number" id="m-lng" placeholder="経度（例: 130.4737）" step="0.0001">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-add" onclick="addMuseum()">追加する</button>
    </div>
  </div>
</div>

let museums = [];
let records = {};
let currentPref = 'all';
let selectedId = null;
let markers = {};
let map;

// ===== ローカル保存（フォールバック） =====
function saveLocal() {
  localStorage.setItem('kyushu_rec', JSON.stringify(records));
  localStorage.setItem('kyushu_custom', JSON.stringify(museums.filter(m=>m.isCustom)));
}

// ===== Firestore保存 =====
async function save() {
  saveLocal();
  if (!window._db || !window._fsLib) return;
  const { doc, setDoc } = window._fsLib;
  try {
    await setDoc(doc(window._db, 'data', 'records'), records);
    await setDoc(doc(window._db, 'data', 'customMuseums'), {list: museums.filter(m=>m.isCustom)});
  } catch(e) { console.warn('Firestore書き込みエラー:', e); }
}

// ===== 初期データ読み込み =====
async function load() {
  // まずローカルから読み込んで即時表示
  try {
    const r = localStorage.getItem('kyushu_rec'); if (r) records = JSON.parse(r);
    const c = localStorage.getItem('kyushu_custom');
    museums = c ? [...BASE_MUSEUMS.map(m=>({...m,isCustom:false})), ...JSON.parse(c)]
                : BASE_MUSEUMS.map(m=>({...m,isCustom:false}));
  } catch(e) { museums = BASE_MUSEUMS.map(m=>({...m,isCustom:false})); }

  // Firestoreが使えれば上書き
  if (window._db && window._fsLib) {
    try {
      const { doc, getDoc } = window._fsLib;
      const recSnap = await getDoc(doc(window._db, 'data', 'records'));
      if (recSnap.exists()) records = recSnap.data();
      const cusSnap = await getDoc(doc(window._db, 'data', 'customMuseums'));
      const customList = cusSnap.exists() ? cusSnap.data().list : [];
      museums = [...BASE_MUSEUMS.map(m=>({...m,isCustom:false})), ...customList];
      saveLocal(); // ローカルにも反映
    } catch(e) { console.warn('Firestore読み込みエラー:', e); }
  }
}

let infoWindow;

function makeMarkerIcon(color) {
  return {
    path: 'M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z',
    fillColor: color,
    fillOpacity: 1,
    strokeColor: 'white',
    strokeWeight: 1.5,
    scale: 1.3,
    anchor: new google.maps.Point(12, 36),
  };
}

function getMarkerColor(museum) {
  const rec = records[museum.id] || {};
  return museum.isCustom ? '#f0c040' : rec.visited ? '#27ae60' : '#c0392b';
}

function renderMarkers(filtered) {
  Object.values(markers).forEach(m => m.setMap(null));
  markers = {};
  const list = filtered || museums;
  list.forEach(museum => {
    if (!museum.lat || !museum.lng) return;
    if (currentPref !== 'all' && !museum.pref.includes(currentPref)) return;
    addMarker(museum);
  });
  updateStats();
}

function addMarker(museum) {
  const rec = records[museum.id] || {};
  const marker = new google.maps.Marker({
    position: { lat: museum.lat, lng: museum.lng },
    map: map,
    icon: makeMarkerIcon(getMarkerColor(museum)),
    title: museum.name,
  });
  marker.addListener('click', () => {
    // マーカークリックで直接詳細パネルを開く（InfoWindowのiframe問題を回避）
    openDetail(museum.id);
  });
  markers[museum.id] = marker;
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 32.5, lng: 130.8 },
    zoom: 7,
    mapTypeControl: false,
    fullscreenControl: false,
    streetViewControl: false,
  });
  infoWindow = new google.maps.InfoWindow();

  // Places検索（地図上の場所検索）
  const placesInput = document.getElementById('places-input');
  const autocomplete = new google.maps.places.Autocomplete(placesInput, {
    componentRestrictions: { country: 'jp' },
    fields: ['geometry', 'name'],
  });
  autocomplete.addListener('place_changed', () => {
    const place = autocomplete.getPlace();
    if (place.geometry) {
      map.panTo(place.geometry.location);
      map.setZoom(14);
    }
  });

  renderMarkers();
}

function filterByName() {
  filterMarkers();
}

window.openDetail = function openDetail(id) {
  if (infoWindow) infoWindow.close();
  selectedId = id;
  const m = museums.find(x=>x.id===id);
  const rec = records[id] || {};
  document.getElementById('d-name').textContent = m.name;
  document.getElementById('d-pref').textContent = m.pref + '　' + m.address;
  document.getElementById('d-info').innerHTML = `
    <div class="info-row">📞 <span>${m.tel||'—'}</span></div>
    ${m.url?`<div class="info-row">🔗 <a href="${m.url}" target="_blank">${m.url}</a></div>`:''}
  `;
  const vBtn = document.getElementById('visited-btn');
  vBtn.textContent = rec.visited ? '✓ 訪問済み' : '✓ 訪問済みにする';
  vBtn.className = 'visited-btn'+(rec.visited?' active':'');
  document.getElementById('memo').value = rec.memo || '';
  renderStars(rec.rating||0);
  document.getElementById('detail-panel').classList.add('open');
  if (m.lat && m.lng) map.panTo({ lat: m.lat, lng: m.lng });
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedId = null;
}

function toggleVisited() {
  if (!selectedId) return;
  if (!records[selectedId]) records[selectedId] = {};
  records[selectedId].visited = !records[selectedId].visited;
  save();
  const m = museums.find(x=>x.id===selectedId);
  if (markers[selectedId]) markers[selectedId].setIcon(makeMarkerIcon(getMarkerColor(m)));
  openDetail(selectedId);
  updateStats();
}

function setRating(n) {
  if (!selectedId) return;
  if (!records[selectedId]) records[selectedId] = {};
  records[selectedId].rating = n;
  renderStars(n);
}

function renderStars(n) {
  document.querySelectorAll('.star').forEach((s,i)=>s.className='star'+(i<n?' on':''));
}

function saveMemo() {
  if (!selectedId) return;
  if (!records[selectedId]) records[selectedId] = {};
  records[selectedId].memo = document.getElementById('memo').value;
  save();
  const btn = document.querySelector('.save-btn');
  btn.textContent = '✓ 保存しました';
  setTimeout(()=>btn.textContent='保存する', 1500);
}

function setPref(pref, btn) {
  currentPref = pref;
  document.querySelectorAll('.pref-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers();
}

function filterMarkers() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { renderMarkers(); return; }
  const filtered = museums.filter(m =>
    m.name.toLowerCase().includes(q) || m.address.toLowerCase().includes(q)
  );
  renderMarkers(filtered);
  // フィルター後、最初のマーカーに移動
  const first = filtered.find(m => m.lat && m.lng);
  if (first) map.panTo({ lat: first.lat, lng: first.lng });
}

function updateStats() {
  const total = museums.length;
  const visited = museums.filter(m=>records[m.id]?.visited).length;
  document.getElementById('total-count').textContent = total;
  document.getElementById('visited-count').textContent = visited;
  document.getElementById('progress').textContent = Math.round(visited/total*100)+'%';
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['m-name','m-address','m-tel','m-url','m-lat','m-lng'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-pref').value='';
}

function addMuseum() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('館名を入力してください'); return; }
  const lat = parseFloat(document.getElementById('m-lat').value);
  const lng = parseFloat(document.getElementById('m-lng').value);
  const m = {
    id:'c_'+Date.now(), name, isCustom:true,
    pref: document.getElementById('m-pref').value,
    address: document.getElementById('m-address').value,
    tel: document.getElementById('m-tel').value,
    url: document.getElementById('m-url').value,
    lat: isNaN(lat)?null:lat, lng: isNaN(lng)?null:lng,
  };
  museums.push(m);
  save();
  closeModal();
  if (m.lat && m.lng) {
    addMarker(m);
    map.panTo({ lat: m.lat, lng: m.lng });
    google.maps.event.trigger(markers[m.id], 'click');
  }
  updateStats();
}

function showSyncStatus(msg) {
  let el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 3000);
}

// Firebase と Google Maps 両方の準備を待ってから起動
let firebaseReady = false;
let mapsReady = false;
let appInited = false;

async function tryInit() {
  if (appInited || !firebaseReady || !mapsReady) return;
  appInited = true;
  await load();
  initMap();
  updateStats();
  showSyncStatus('🟢 Firestore同期中');
}

// Firebase準備完了
window.addEventListener('firebase-ready', () => {
  firebaseReady = true;
  tryInit();
});

// Google Maps準備完了（DOMContentLoaded後にgoogle.mapsの存在を確認）
function waitForGoogleMaps() {
  if (typeof google !== 'undefined' && google.maps) {
    mapsReady = true;
    tryInit();
  } else {
    setTimeout(waitForGoogleMaps, 100);
  }
}
document.addEventListener('DOMContentLoaded', waitForGoogleMaps);

// Firebaseタイムアウト（3秒待ってもfirebase-readyが来なければオフラインで起動）
setTimeout(() => {
  if (!firebaseReady) {
    firebaseReady = true;
    tryInit();
    showSyncStatus('⚠️ オフラインモード');
  }
}, 3000);
</script>
</body>
</html>
